<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery - Artistry Ink</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      color: #333;
    }

    header {
      background-color: #3a3a3a;
      color: white;
      padding: 1rem 5%;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      padding: 2rem 5%;
    }

    .gallery-grid img,
    .gallery-grid video {
      width: 100%;
      height: auto;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    footer {
      background-color: #3a3a3a;
      color: white;
      text-align: center;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Gallery</h1>
    <p>Explore our artwork, events, and creative process</p>
  </header>

  <section class="gallery-grid">
    <!-- IMAGES -->
    <img src="images/gallery1.jpg" alt="Gallery Image 1"/>
    <img src="images/gallery2.jpg" alt="Gallery Image 2"/>
    <img src="images/gallery3.jpg" alt="Gallery Image 3"/>

    <!-- VIDEOS -->
    <video controls>
      <source src="videos/demo1.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <video controls>
      <source src="videos/demo2.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <!-- Add more as needed -->
  </section>

  <footer>
    <p>&copy; 2025 Artistry Ink. All Rights Reserved.</p>
  </footer>
</body>
</html>
